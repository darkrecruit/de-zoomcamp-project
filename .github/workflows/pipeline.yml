name: Run Bruin Pipeline

on:
  workflow_dispatch:

concurrency:
  group: bruin-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    environment: default
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      # 1. Checkout
      - uses: actions/checkout@v6

      # 2. GCP Auth via Workload Identity Federation (sets ADC for Terraform)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      # 3. Terraform setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      # 4. Terraform init + apply
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcs_bucket_name=${{ vars.GCS_BUCKET_NAME }}"

      # 5. Upload Terraform state artifact (safety net if destroy fails)
      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state
          path: |
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup
          retention-days: 1
          if-no-files-found: warn

      # 6. Python setup
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 7. Install uv + sync dependencies
      - name: Install uv and dependencies
        run: |
          pip install uv -q
          uv sync

      # 8. Install Bruin CLI
      - name: Setup Bruin
        uses: bruin-data/setup-bruin@v0.0.3
        with:
          version: v0.11.498

      # 9. Validate pipeline (before credentials, so dry-run skips query checks)
      - name: Validate Pipeline
        run: bruin validate maddison-project-pipeline

      # 10. Generate .bruin.yml from Terraform-created SA key
      - name: Generate .bruin.yml
        run: |
          cat > .bruin.yml << 'BRUINYML'
          default_environment: production
          environments:
            production:
              connections:
                google_cloud_platform:
                  - name: "gcp"
                    service_account_file: "secrets/gcp-sa.json"
                    project_id: "${{ vars.GCP_PROJECT_ID }}"
                    location: "us-central1"
                gcs:
                  - name: "gcs"
                    service_account_file: "secrets/gcp-sa.json"
          BRUINYML
        
      # 10. Run pipeline
      - name: Run Bruin Pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/secrets/gcp-sa.json
        run: |
          bruin run maddison-project-pipeline \
            --var gcs_bucket_name='"${{ vars.GCS_BUCKET_NAME }}"' \
            --var gcp_project_id='"${{ vars.GCP_PROJECT_ID }}"'

      # 12. Terraform Destroy — ALWAYS runs, even if pipeline fails
      - name: Terraform Destroy
        if: always()
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcs_bucket_name=${{ vars.GCS_BUCKET_NAME }}"
