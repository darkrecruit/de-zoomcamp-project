name: maddison_project_raw.gcs_csv_load
type: ingestr
description: "Load CSV file from GCS into BigQuery"
depends:
  - maddison_project_raw.download_to_gcs

connection: gcp

parameters:
  source_connection: gcs
  source_table: '{{ var.gcs_bucket_name }}/raw/data.csv'
  destination: bigquery
  incremental_strategy: replace
  file_type: csv

columns:
  - name: countrycode
    type: string
    checks:
      - name: not_null
  - name: country
    type: string
    description: "Country name"
    checks:
      - name: not_null
  - name: region
    type: string
    description: "Region name"
    checks:
      - name: not_null
  - name: year
    type: int64
    description: "Year of the observation"
    checks:
      - name: not_null
      - name: positive
  - name: pop
    type: float64
    description: "Population count in thousands"
    checks:
      - name: non_negative
  - name: gdppc
    type: float64
    description: "GDP per capita"
    checks:
      - name: non_negative

custom_checks:
  - name: population_integer_check
    description: checks pop column contains only integer values
    query: 'SELECT COUNTIF(pop != TRUNC(pop)) FROM maddison_project_raw.gcs_csv_load'
  - name: gdppc_integer_check
    description: checks gdppc column contains only integer values
    query: 'SELECT COUNTIF(gdppc != TRUNC(gdppc)) FROM maddison_project_raw.gcs_csv_load'
